<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>잠시 닫아두었습니다</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b0b0f;color:#fff}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:720px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:28px}
    h1{margin:0 0 10px;font-size:22px}
    p{margin:0;line-height:1.7;color:rgba(255,255,255,.85)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>사이트를 잠시 닫아두었습니다</h1>
      <p>정리 및 점검 중입니다. 빠르게 돌아오겠습니다.</p>
    </div>
  </div>
</body>
</html>
