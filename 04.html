<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Art Generator</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (JSX 변환용) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* 커스텀 폰트 및 스타일 */
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 아이콘 컴포넌트 ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Music = (props) => (
            <IconBase {...props}>
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
            </IconBase>
        );

        const Copy = (props) => (
            <IconBase {...props}>
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </IconBase>
        );

        const CheckCircle2 = (props) => (
            <IconBase {...props}>
                <circle cx="12" cy="12" r="10" />
                <path d="m9 12 2 2 4-4" />
            </IconBase>
        );

        const Eye = (props) => (
            <IconBase {...props}>
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
            </IconBase>
        );

        const EyeOff = (props) => (
            <IconBase {...props}>
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line x1="2" x2="22" y1="2" y2="22" />
            </IconBase>
        );

        const User = (props) => (
            <IconBase {...props}>
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </IconBase>
        );

        const Square = (props) => (
            <IconBase {...props}>
                <rect width="18" height="18" x="3" y="3" rx="2" />
            </IconBase>
        );

        const Monitor = (props) => (
            <IconBase {...props}>
                <rect width="20" height="14" x="2" y="3" rx="2" />
                <line x1="8" x2="16" y1="21" y2="21" />
                <line x1="12" x2="12" y1="17" y2="21" />
            </IconBase>
        );

        const Smartphone = (props) => (
            <IconBase {...props}>
                <rect width="14" height="20" x="5" y="2" rx="2" ry="2" />
                <path d="M12 18h.01" />
            </IconBase>
        );

        const ImageIcon = (props) => (
            <IconBase {...props}>
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                <circle cx="9" cy="9" r="2" />
                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
            </IconBase>
        );
        
        const Settings2 = (props) => (
            <IconBase {...props}>
                <path d="M20 7h-9" />
                <path d="M14 17H5" />
                <circle cx="17" cy="17" r="3" />
                <circle cx="7" cy="7" r="3" />
            </IconBase>
        );

        const Sparkles = (props) => (
            <IconBase {...props}>
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                <path d="M5 3v4" />
                <path d="M19 17v4" />
                <path d="M3 5h4" />
                <path d="M17 19h4" />
            </IconBase>
        );

        const Palette = (props) => (
            <IconBase {...props}>
                <circle cx="13.5" cy="6.5" r=".5" fill="currentColor" />
                <circle cx="17.5" cy="10.5" r=".5" fill="currentColor" />
                <circle cx="8.5" cy="7.5" r=".5" fill="currentColor" />
                <circle cx="6.5" cy="12.5" r=".5" fill="currentColor" />
                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" />
            </IconBase>
        );

        const Camera = (props) => (
            <IconBase {...props}>
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" />
                <circle cx="12" cy="13" r="3" />
            </IconBase>
        );

        // --- 메인 App 컴포넌트 ---
        const App = () => {
            // 메인 탭 상태 ('custom' 또는 'mood')
            const [activeTab, setActiveTab] = useState('mood');

            // --- 공통 상태 ---
            const [baseInput, setBaseInput] = useState("");
            const [ratio, setRatio] = useState("1:1");
            const [finalPrompt, setFinalPrompt] = useState("");
            const [copied, setCopied] = useState(false);

            // --- [탭 1] 커스텀 생성용 상태 ---
            const [ethnicity, setEthnicity] = useState(""); 
            const [gender, setGender] = useState("");      
            const [pose, setPose] = useState("front");
            const [eyeState, setEyeState] = useState("open");
            const [background, setBackground] = useState("black"); 
            const [style, setStyle] = useState("digital");
            const hasCharacter = ethnicity || gender;

            // --- [탭 2] 감성/분위기 생성용 상태 ---
            const [selectedMood, setSelectedMood] = useState("감사자신감용기희망");
            const [moodStyleType, setMoodStyleType] = useState("artwork"); // 'artwork' | 'photo'

            // --- 데이터 정의 ---
            // 공통: 비율
            const ratios = [
                { id: '1:1', label: '1:1 (Square)', icon: <Square size={18} />, value: '--ar 1:1' },
                { id: '16:9', label: '16:9 (Wide)', icon: <Monitor size={18} />, value: '--ar 16:9' },
                { id: '9:16', label: '9:16 (Mobile)', icon: <Smartphone size={18} />, value: '--ar 9:16' },
            ];

            // [탭 1] 데이터
            const ethnicityOptions = [
                { id: 'Korean', label: '한국인 (Korean)' },
                { id: 'Black', label: '흑인 (Black)' },
                { id: 'White', label: '백인 (White)' },
            ];
            const genderOptions = [
                { id: 'Man', label: '남자 (Man)' },
                { id: 'Woman', label: '여자 (Woman)' },
            ];
            const poses = [
                { id: 'front', label: '앞모습 (Front)', value: 'front view, facing camera, symmetrical composition' },
                { id: 'side', label: '옆모습 (Side)', value: 'side profile view, silhouette from side' },
                { id: 'back', label: '뒷모습 (Back)', value: 'view from behind, back turned to camera' },
                { id: 'turning', label: '뒤돌아보는 (Turning)', value: 'looking back over shoulder, dynamic pose' },
                { id: 'gazing', label: '먼 곳 응시 (Gazing)', value: 'looking into the distance, gazing at horizon, thoughtful expression' },
                { id: 'dynamic', label: '역동적 (Action)', value: 'dynamic action pose, floating in air, energetic movement' },
            ];
            const eyeOptions = [
                { id: 'open', label: '눈 뜬 상태', icon: <Eye size={18} />, value: 'eyes wide open, detailed iris, expressive eyes' },
                { id: 'closed', label: '눈 감은 상태', icon: <EyeOff size={18} />, value: 'eyes closed, peaceful expression, sleeping or meditating' },
            ];
            const backgrounds = [
                { id: 'black', label: '단색 검정 (Pitch Black)', value: 'solid pitch black background' },
                { id: 'night', label: '밤 분위기 (Night Vibe)', value: 'cinematic dark background, subtle urban night lights, depth of field' }
            ];
            const styles = [
                { id: 'digital', label: '디지털 아트', value: 'high quality digital art, vibrant colors, clean lines, artstation trends' },
                { id: 'anime', label: '애니메이션', value: 'anime style, cel shaded, makoto shinkai style, studio ghibli vibe' },
                { id: 'photorealistic', label: '실사 (Photo)', value: 'photorealistic, 8k, cinematographic lighting, unreal engine 5 render' },
                { id: 'oil', label: '유화 (Oil Painting)', value: 'oil painting, textured brush strokes, classical art style' },
                { id: 'cyberpunk', label: '사이버펑크', value: 'cyberpunk, neon lights, futuristic city background, techwear' },
                { id: 'retro', label: '레트로/로파이', value: 'lo-fi hip hop aesthetic, retro 90s anime style, vhs glitch effect, grainy texture' },
            ];

            // [탭 2] 데이터 (구체적인 사물/빛/색감 묘사 모두 제거, 순수 분위기 키워드만 남김)
            const moodOptions = [
                { id: '감사자신감용기희망', label: '감사/자신감/용기/희망', enLabel: 'Gratitude, Confidence, Courage, Hope', color: 'from-amber-400 to-orange-500', value: 'gratitude, confidence, courage, hope' },
                { id: '그리움_회상', label: '그리움/회상', enLabel: 'Nostalgia, Reminiscence', color: 'from-yellow-600 to-amber-800', value: 'nostalgia, reminiscence' },
                { id: '밝고편안한', label: '밝고 편안한', enLabel: 'Bright and Cozy', color: 'from-green-400 to-emerald-500', value: 'bright, relaxing' },
                { id: '사랑', label: '사랑', enLabel: 'Love, Romance', color: 'from-pink-400 to-rose-500', value: 'love, romance, tender' },
                { id: '슬픈', label: '슬픈', enLabel: 'Sad, Melancholic', color: 'from-slate-500 to-gray-700', value: 'sad, melancholic' },
                { id: '신나는 경쾌한', label: '신나는 경쾌한', enLabel: 'Upbeat, Joyful', color: 'from-yellow-400 to-red-500', value: 'upbeat, joyful, exciting' },
                { id: '신비로움', label: '신비로움', enLabel: 'Mysterious, Magical', color: 'from-purple-500 to-indigo-600', value: 'mysterious, magical' },
                { id: '아련한', label: '아련한', enLabel: 'Faint, Wistful', color: 'from-indigo-300 to-purple-400', value: 'faint, wistful' },
                { id: '은밀한 친밀감', label: '은밀한 친밀감', enLabel: 'Secretive Intimacy', color: 'from-rose-900 to-black', value: 'secretive intimacy' },
                { id: '정돈된 친밀감', label: '정돈된 친밀감', enLabel: 'Structured Intimacy', color: 'from-stone-400 to-stone-600', value: 'structured intimacy' },
                { id: '청명한 평온', label: '청명한 평온', enLabel: 'Clear Tranquility', color: 'from-cyan-400 to-blue-500', value: 'clear, tranquility, serene' }
            ];

            const moodStyleOptions = [
                { id: 'artwork', label: '아트웍 (Artwork)', icon: <Palette size={20} />, value: 'masterpiece illustration, highly detailed digital art, expressive brushstrokes, artistic concept art, visually stunning' },
                { id: 'photo', label: '실사이미지 (Photo)', icon: <Camera size={20} />, value: 'photorealistic, 8k resolution, raw photo, highly detailed texture, cinematic lighting, shot on 35mm lens, hyper-realistic' }
            ];

            // --- 프롬프트 생성 로직 ---
            const generatePrompt = () => {
                const selectedRatioObj = ratios.find(r => r.id === ratio);
                const ratioText = selectedRatioObj ? selectedRatioObj.id : "1:1";
                const moodInput = baseInput.trim();

                if (activeTab === 'custom') {
                    // [탭 1] 커스텀 생성 로직 (미드나잇 뮤직)
                    const selectedStyleObj = styles.find(s => s.id === style);
                    const selectedBackgroundObj = backgrounds.find(b => b.id === background);
                    const styleText = selectedStyleObj ? selectedStyleObj.value : "";
                    const backgroundText = selectedBackgroundObj ? selectedBackgroundObj.value : "";

                    if (hasCharacter) {
                        const selectedPoseObj = poses.find(p => p.id === pose);
                        const selectedEyesObj = eyeOptions.find(e => e.id === eyeState);
                        const poseText = selectedPoseObj ? selectedPoseObj.value : "";
                        const eyesText = selectedEyesObj ? selectedEyesObj.value : "";
                        const characterTraits = [ethnicity, gender].filter(Boolean).join(" ");
                        
                        // 시각적으로 명확한 키워드로 대폭 단순화 및 최적화
                        const framingPrompt = "centered portrait, perfectly centered face";
                        const atmospherePrompt = "rhythmic flowing neon lights, deep shadows, low-key dramatic lighting, intimate mood";
                        const integrationPrompt = "neon light illuminating the subject, seamless integration of glowing light and human form";

                        // 믹스보드 최적화: 시각적 구현이 불가능한 추상적 수식어 제거
                        const parts = [
                            moodInput,
                            `${characterTraits} character`,
                            framingPrompt,
                            poseText,
                            eyesText,
                            atmospherePrompt,
                            integrationPrompt,
                            backgroundText,
                            styleText,
                            `masterpiece, highly detailed, cinematic lighting, strong contrast`
                        ];

                        return parts.filter(Boolean).join(", ") + ` --ar ${ratioText}`;
                    } else {
                        // 인물 미선택시 (추상화 모드)
                        const parts = [
                            moodInput || "abstract visual art",
                            `dynamic flowing neon light streaks`,
                            backgroundText,
                            styleText,
                            `masterpiece, highly detailed, cinematic lighting, strong contrast`
                        ];

                        return parts.filter(Boolean).join(", ") + ` --ar ${ratioText}`;
                    }
                } else {
                    // [탭 2] 감성/분위기 생성 로직 (릴렉스 뮤직)
                    const selectedMoodObj = moodOptions.find(m => m.id === selectedMood);
                    const selectedMoodStyleObj = moodStyleOptions.find(s => s.id === moodStyleType);
                    
                    const vibeText = selectedMoodObj ? selectedMoodObj.value : "";
                    const styleText = selectedMoodStyleObj ? selectedMoodStyleObj.value : "";
                    
                    // 선택한 분위기 키워드 자체만 노출하도록 극단적 단순화
                    const parts = [
                        moodInput,
                        `${vibeText} atmosphere`,
                        styleText,
                        `masterpiece, highly detailed`
                    ];

                    return parts.filter(Boolean).join(", ") + ` --ar ${ratioText}`;
                }
            };

            // 상태 변경 시 프롬프트 자동 업데이트
            useEffect(() => {
                setFinalPrompt(generatePrompt());
            }, [activeTab, baseInput, ethnicity, gender, pose, eyeState, ratio, background, style, hasCharacter, selectedMood, moodStyleType]);

            // --- 복사 기능 ---
            const copyToClipboard = () => {
                const textArea = document.createElement("textarea");
                textArea.value = finalPrompt;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }
                } catch (err) {
                    console.error('Copy error', err);
                }
                document.body.removeChild(textArea);
            };

            const toggleEthnicity = (id) => setEthnicity(prev => prev === id ? "" : id);
            const toggleGender = (id) => setGender(prev => prev === id ? "" : id);

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 p-4 md:p-8 font-sans selection:bg-indigo-500 selection:text-white pb-24">
                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                        
                        {/* --- 왼쪽: 설정 패널 --- */}
                        <div className="space-y-6">
                            
                            {/* 헤더 */}
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-3 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-500/30">
                                    <Music size={28} className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
                                        Suno Art Generator
                                    </h1>
                                    <p className="text-slate-400 text-sm">Gemini Powered Prompt Builder ✨</p>
                                </div>
                            </div>

                            {/* 공통: 기본 입력 */}
                            <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                <label className="block text-sm font-medium text-slate-300 mb-2 flex items-center gap-2">
                                    <User size={16} />
                                    곡 주제 / 가사 내용 (선택사항)
                                </label>
                                <textarea 
                                    className="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-slate-100 placeholder-slate-600 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none resize-none h-24"
                                    placeholder="예: 비 오는 날 창밖을 바라보는 쓸쓸한 느낌, 짝사랑..."
                                    value={baseInput}
                                    onChange={(e) => setBaseInput(e.target.value)}
                                />
                            </div>

                            {/* --- 탭 전환 버튼 --- */}
                            <div className="flex p-1 bg-slate-800 rounded-2xl border border-slate-700">
                                <button
                                    onClick={() => setActiveTab('mood')}
                                    className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${
                                        activeTab === 'mood' 
                                        ? 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-lg shadow-indigo-900/50' 
                                        : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    <Sparkles size={18} />
                                    릴렉스 뮤직
                                </button>
                                <button
                                    onClick={() => setActiveTab('custom')}
                                    className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-sm font-bold transition-all ${
                                        activeTab === 'custom' 
                                        ? 'bg-gradient-to-r from-indigo-600 to-blue-600 text-white shadow-lg shadow-indigo-900/50' 
                                        : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    <Settings2 size={18} />
                                    미드나잇 뮤직
                                </button>
                            </div>

                            {/* ========================================================= */}
                            {/* [탭 2] 감성/분위기 모드 UI */}
                            {/* ========================================================= */}
                            {activeTab === 'mood' && (
                                <div className="space-y-6 animate-in fade-in duration-300">
                                    {/* 분위기 선택 */}
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                        <h3 className="text-sm font-medium text-slate-300 mb-4 flex items-center gap-2">
                                            <Sparkles size={16} className="text-purple-400" />
                                            곡 분위기 키워드 선택 (필수)
                                        </h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                            {moodOptions.map((m) => (
                                                <button
                                                    key={m.id}
                                                    onClick={() => setSelectedMood(m.id)}
                                                    className={`relative overflow-hidden flex flex-col items-center justify-center p-3 rounded-xl text-sm transition-all border ${
                                                        selectedMood === m.id 
                                                        ? `border-slate-400 text-white bg-slate-700 shadow-lg shadow-black/50` 
                                                        : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'
                                                    }`}
                                                >
                                                    {selectedMood === m.id && (
                                                        <div className={`absolute inset-0 opacity-30 bg-gradient-to-br ${m.color}`}></div>
                                                    )}
                                                    <span className="relative z-10 font-medium text-center leading-tight">
                                                        {m.label}
                                                    </span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 스타일 선택 (아트웍/실사) */}
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                        <h3 className="text-sm font-medium text-slate-300 mb-4">출력 스타일 (Style)</h3>
                                        <div className="flex gap-4">
                                            {moodStyleOptions.map((s) => (
                                                <button
                                                    key={s.id}
                                                    onClick={() => setMoodStyleType(s.id)}
                                                    className={`flex-1 flex flex-col items-center justify-center gap-3 py-6 rounded-xl border transition-all ${
                                                        moodStyleType === s.id
                                                        ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg'
                                                        : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'
                                                    }`}
                                                >
                                                    {s.icon}
                                                    <span className="font-bold text-sm">{s.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}


                            {/* ========================================================= */}
                            {/* [탭 1] 커스텀 상세 모드 UI */}
                            {/* ========================================================= */}
                            {activeTab === 'custom' && (
                                <div className="space-y-6 animate-in fade-in duration-300">
                                    {/* 인물 특징 */}
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-sm font-medium text-slate-300">인물 특징 (Character Traits)</h3>
                                            {!hasCharacter && (
                                                <span className="text-xs text-indigo-400 bg-indigo-500/10 px-2 py-1 rounded-full">
                                                    미선택 시 배경/추상화 모드
                                                </span>
                                            )}
                                        </div>
                                        <div className="space-y-4">
                                            <div className="flex flex-wrap gap-2">
                                                {ethnicityOptions.map((opt) => (
                                                    <button
                                                        key={opt.id}
                                                        onClick={() => toggleEthnicity(opt.id)}
                                                        className={`px-4 py-2 rounded-lg text-sm transition-all border ${
                                                            ethnicity === opt.id
                                                            ? 'bg-pink-600 border-pink-500 text-white'
                                                            : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'
                                                        }`}
                                                    >
                                                        {opt.label}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {genderOptions.map((opt) => (
                                                    <button
                                                        key={opt.id}
                                                        onClick={() => toggleGender(opt.id)}
                                                        className={`px-4 py-2 rounded-lg text-sm transition-all border ${
                                                            gender === opt.id
                                                            ? 'bg-blue-600 border-blue-500 text-white'
                                                            : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'
                                                        }`}
                                                    >
                                                        {opt.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 인물 종속 설정들 (자세, 눈) */}
                                    <div className={`transition-all duration-300 space-y-6 ${!hasCharacter ? 'opacity-40 grayscale pointer-events-none' : ''}`}>
                                        <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="text-sm font-medium text-slate-300">캐릭터 자세 (Pose)</h3>
                                                {!hasCharacter && <span className="text-xs text-slate-500">인물 미선택 시 비활성</span>}
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                {poses.map((p) => (
                                                    <button
                                                        key={p.id}
                                                        onClick={() => setPose(p.id)}
                                                        className={`text-left px-4 py-3 rounded-xl text-sm transition-all border ${
                                                            pose === p.id 
                                                            ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg shadow-indigo-900/50' 
                                                            : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'
                                                        }`}
                                                    >
                                                        {p.label}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                            <h3 className="text-sm font-medium text-slate-300 mb-4">눈 상태 (Eyes)</h3>
                                            <div className="flex gap-3">
                                                {eyeOptions.map((e) => (
                                                    <button
                                                        key={e.id}
                                                        onClick={() => setEyeState(e.id)}
                                                        className={`flex-1 flex flex-col items-center justify-center gap-2 py-3 rounded-xl border transition-all ${
                                                            eyeState === e.id
                                                            ? 'bg-indigo-600 border-indigo-500 text-white' 
                                                            : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'
                                                        }`}
                                                    >
                                                        {e.icon}
                                                        <span className="text-xs">{e.label}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* 배경 선택 */}
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                        <h3 className="text-sm font-medium text-slate-300 mb-4">배경 (Background)</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            {backgrounds.map((b) => (
                                                <button
                                                    key={b.id}
                                                    onClick={() => setBackground(b.id)}
                                                    className={`text-left px-4 py-3 rounded-xl text-sm transition-all border ${
                                                        background === b.id 
                                                        ? 'bg-indigo-600 border-indigo-500 text-white shadow-lg shadow-indigo-900/50' 
                                                        : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'
                                                    }`}
                                                >
                                                    {b.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 화풍 선택 */}
                                    <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                        <h3 className="text-sm font-medium text-slate-300 mb-4">화풍 / 스타일 (Art Style)</h3>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                            {styles.map((s) => (
                                                <button
                                                    key={s.id}
                                                    onClick={() => setStyle(s.id)}
                                                    className={`px-3 py-2 rounded-lg text-xs font-medium transition-all border ${
                                                        style === s.id
                                                        ? 'bg-purple-600 border-purple-500 text-white'
                                                        : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'
                                                    }`}
                                                >
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 공통: 비율 선택 (항상 하단에 표시) */}
                            <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
                                <h3 className="text-sm font-medium text-slate-300 mb-4">이미지 비율 (Ratio)</h3>
                                <div className="flex gap-3">
                                    {ratios.map((r) => (
                                        <button
                                            key={r.id}
                                            onClick={() => setRatio(r.id)}
                                            className={`flex-1 flex flex-col items-center justify-center gap-2 py-3 rounded-xl border transition-all ${
                                                ratio === r.id
                                                ? 'bg-indigo-600 border-indigo-500 text-white' 
                                                : 'bg-slate-900 border-slate-700 text-slate-400 hover:bg-slate-800'
                                            }`}
                                        >
                                            {r.icon}
                                            <span className="text-xs font-bold">{r.id}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                        </div>

                        {/* --- 오른쪽: 결과물 미리보기 --- */}
                        <div className="lg:sticky lg:top-8 h-fit space-y-6">
                            
                            <div className="bg-gradient-to-br from-indigo-900 to-purple-900 rounded-3xl p-1 shadow-2xl">
                                <div className="bg-slate-950/80 backdrop-blur-xl rounded-[20px] p-6 md:p-8 border border-white/10 h-full flex flex-col">
                                    
                                    <div className="flex items-center justify-between mb-6">
                                        <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                            <ImageIcon className="text-purple-400" size={24} />
                                            Generated Prompt
                                        </h2>
                                        <div className={`text-xs px-3 py-1 rounded-full border ${copied ? 'bg-green-500/20 border-green-500 text-green-400' : 'border-slate-700 text-slate-500'}`}>
                                            {copied ? '복사 완료!' : 'Ready to copy'}
                                        </div>
                                    </div>

                                    {/* 프롬프트 결과창 */}
                                    <div className="bg-black/50 rounded-xl p-6 border border-slate-700/50 min-h-[250px] flex flex-col relative group">
                                        <p className="text-slate-200 leading-relaxed font-mono text-sm break-words whitespace-pre-wrap">
                                            {finalPrompt}
                                        </p>
                                        
                                        <div className="mt-8 pt-6 flex justify-end">
                                            <button 
                                                onClick={copyToClipboard}
                                                className="flex items-center gap-2 bg-white text-slate-900 hover:bg-indigo-50 px-6 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95"
                                            >
                                                {copied ? <CheckCircle2 size={20} /> : <Copy size={20} />}
                                                {copied ? '복사됨' : '프롬프트 복사'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* 사용 팁 */}
                                    <div className="mt-6 pt-6 border-t border-white/10">
                                        <h3 className="text-sm font-semibold text-slate-300 mb-3">💡 팁 & 사용 가이드</h3>
                                        <ul className="space-y-2 text-xs text-slate-400">
                                            <li className="flex items-start gap-2">
                                                <span className="bg-slate-700 rounded-full w-4 h-4 flex items-center justify-center text-[10px] mt-0.5 shrink-0">1</span>
                                                생성된 영문 프롬프트를 복사하여 ChatGPT(DALL-E)나 Midjourney 등 이미지 생성기에 붙여넣으세요.
                                            </li>
                                            <li className="flex items-start gap-2">
                                                <span className="bg-slate-700 rounded-full w-4 h-4 flex items-center justify-center text-[10px] mt-0.5 shrink-0">2</span>
                                                <strong>릴렉스 뮤직 탭</strong>: 복잡한 인물 설정 없이 분위기만으로 빠르고 아름다운 배경/풍경을 만듭니다.
                                            </li>
                                        </ul>
                                    </div>

                                </div>
                            </div>

                            {/* 시각적 예시 (비율 가이드) */}
                            <div className={`w-full rounded-2xl border border-slate-800 bg-slate-900 flex items-center justify-center relative overflow-hidden transition-all duration-500 ${
                                ratio === '16:9' ? 'aspect-video' : ratio === '9:16' ? 'aspect-[9/16] max-w-[300px] mx-auto' : 'aspect-square max-w-[400px] mx-auto'
                            }`}>
                                <div className="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-purple-500/10 animate-pulse"></div>
                                <div className="text-center z-10 p-6">
                                    <div className="flex justify-center mb-4">
                                        <ImageIcon size={48} className="text-slate-700" />
                                    </div>
                                    <p className="text-slate-500 text-sm">
                                        선택한 비율: {ratio}<br/>
                                        비율 미리보기 가이드
                                    </p>
                                </div>
                            </div>

                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
	<button onclick="location.href='index.html'"
style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#4f46e5;color:white;border:none;
padding:12px 28px;border-radius:30px;
font-size:16px;font-weight:600;
box-shadow:0 6px 15px rgba(0,0,0,0.3);
z-index:9999;cursor:pointer;">
홈으로
</button>
</body>
</html>
