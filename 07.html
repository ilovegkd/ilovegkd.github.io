<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가사 수정 도구 (무료 API 연동)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1f2937; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    body { background-color: #111827; color: #f3f4f6; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow { animation: spin 1.5s linear infinite; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans selection:bg-indigo-500 selection:text-white">

  <div class="max-w-6xl mx-auto space-y-6">
    
    <!-- 헤더 섹션 -->
    <header class="flex flex-col md:flex-row items-start md:items-center justify-between bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 gap-4">
      <div class="flex items-center space-x-4">
        <div class="bg-indigo-600 p-3 rounded-xl shadow-inner flex-shrink-0">
          <i data-lucide="music" class="w-6 h-6 text-white"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white flex items-center flex-wrap gap-2">
            AI 가사 편곡기
            <span class="text-xs bg-blue-500/20 text-blue-300 px-2 py-1 rounded-full border border-blue-500/30 flex items-center">
              <i data-lucide="key" class="w-3 h-3 mr-1"></i>
              개인 API 모드 (최신 2.5 Flash 적용)
            </span>
          </h1>
          <p class="text-sm text-gray-400 mt-1 break-keep">구글에서 발급받은 무료 API 키를 사용하여 로컬 환경에서도 에러 없이 완벽하게 작동합니다.</p>
        </div>
      </div>
      
      <div class="flex space-x-2 w-full md:w-auto">
        <input type="file" accept=".txt" id="fileInput" class="hidden" />
        <button onclick="document.getElementById('fileInput').click()" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 bg-gray-700 border border-gray-600 text-gray-200 rounded-lg hover:bg-gray-600 transition-colors font-medium text-sm shadow-sm">
          <i data-lucide="upload" class="w-4 h-4 mr-2"></i>
          파일 열기
        </button>
        <button id="copyBtn" disabled onclick="copyResult()" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 rounded-lg font-medium text-sm transition-colors bg-gray-700 text-gray-500 cursor-not-allowed border border-gray-600 shadow-sm">
          <i data-lucide="copy" class="w-4 h-4 mr-2"></i>
          복사하기
        </button>
        <button id="saveBtn" disabled onclick="downloadResult()" class="flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 rounded-lg font-medium text-sm transition-colors bg-gray-700 text-gray-500 cursor-not-allowed border border-gray-600 shadow-sm">
          <i data-lucide="download" class="w-4 h-4 mr-2"></i>
          TXT 저장
        </button>
      </div>
    </header>

    <!-- API 키 설정 영역 -->
    <div class="bg-gray-800 p-5 rounded-2xl shadow-lg border border-gray-700 flex flex-col md:flex-row items-start md:items-center gap-4">
      <div class="flex items-start space-x-3 flex-1">
        <i data-lucide="key" class="w-5 h-5 text-yellow-500 mt-0.5"></i>
        <div>
          <h3 class="text-sm font-bold text-gray-200">무료 AI API 키 입력</h3>
          <p class="text-xs text-gray-400 mt-1">
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-indigo-400 hover:underline">Google AI Studio(클릭)</a>에서 무료 키를 발급받아 붙여넣어 주세요. (브라우저에 저장되지 않으며 닫으면 초기화됩니다)
          </p>
        </div>
      </div>
      <div class="w-full md:w-auto flex gap-2">
        <input type="password" id="apiKeyInput" placeholder="AIzaSy..." class="flex-1 md:w-64 p-2.5 bg-gray-900 border border-gray-600 rounded-lg text-sm text-white focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>
    </div>

    <!-- 상태 메시지 -->
    <div id="statusMsg" class="hidden p-4 rounded-xl items-center text-sm border font-medium">
      <span id="statusIconContainer" class="mr-3 flex-shrink-0"></span>
      <span id="statusText" class="leading-relaxed">상태 메시지</span>
    </div>

    <!-- 메인 에디터 영역 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      
      <!-- 왼쪽: 원본 가사 & 옵션 -->
      <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex flex-col h-[75vh]">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-gray-200 flex items-center">
            <i data-lucide="file-text" class="w-5 h-5 mr-2 text-gray-400"></i>
            원본 가사
          </h2>
        </div>
        
        <textarea
          id="originalText"
          class="flex-1 w-full p-4 border border-gray-600 rounded-xl bg-gray-900 focus:bg-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none resize-none transition-colors text-sm leading-relaxed text-gray-300 placeholder-gray-500"
          placeholder="여기에 가사를 직접 입력하거나 상단의 '파일 열기' 버튼을 눌러 파일을 불러오세요..."
        ></textarea>

        <!-- 옵션 선택 및 실행 버튼 -->
        <div class="mt-6 border-t border-gray-700 pt-5">
          <!-- 추가 스타일 프롬프트 (선택) -->
          <div class="mb-5">
            <label for="stylePrompt" class="block text-sm font-medium text-gray-300 mb-2 flex items-center">
              <i data-lucide="mic" class="w-4 h-4 mr-1.5 text-indigo-400"></i>
              추가 스타일 프롬프트 <span class="text-gray-500 ml-1 font-normal">(선택)</span>
            </label>
            <textarea
              id="stylePrompt"
              rows="2"
              class="w-full p-3 border border-gray-600 rounded-xl bg-gray-900 focus:ring-2 focus:ring-indigo-500 outline-none resize-y transition-colors text-sm text-gray-300 placeholder-gray-600"
              placeholder="예: dreamy female vocal, late night mood, soft emotional pop..."
            ></textarea>
          </div>

          <button
            id="processBtn"
            onclick="processLyricsAI()"
            class="w-full py-3.5 rounded-xl font-bold flex items-center justify-center transition-all bg-indigo-600 text-white hover:bg-indigo-500 shadow-md hover:shadow-lg active:scale-[0.98]"
          >
            <span id="iconWand"><i data-lucide="wand-2" class="w-5 h-5 mr-2"></i></span>
            <span id="iconLoader" class="hidden"><i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin-slow"></i></span>
            <span id="btnText">개인 API로 프로페셔널 AI 가사 편곡 시작</span>
          </button>
        </div>
      </div>

      <!-- 오른쪽: 수정된 가사 -->
      <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex flex-col h-[75vh]">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-gray-200 flex items-center">
            <i data-lucide="sparkles" class="w-5 h-5 mr-2 text-indigo-400"></i>
            수정된 가사
          </h2>
          <span id="successBadge" class="hidden text-xs font-medium px-2.5 py-1 bg-indigo-900 text-indigo-300 rounded-full border border-indigo-700">
            작업 완료
          </span>
        </div>
        
        <textarea
          id="editedText"
          class="flex-1 w-full p-4 border border-indigo-500/30 rounded-xl bg-gray-900 focus:bg-gray-900 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none resize-none transition-colors text-sm leading-relaxed text-indigo-100 placeholder-gray-600"
          placeholder="AI 변환 결과가 이곳에 나타납니다. 직접 수정 후 상단의 [TXT 저장] 또는 [복사하기] 버튼을 이용하세요."
          oninput="checkEditedText()"
        ></textarea>
      </div>

    </div>
  </div>

  <script>
    // 최초 1회만 아이콘 초기화
    window.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
    });
    
    let currentFileName = '가사_작업본.txt';

    // 상태 메시지 표시 함수
    function showStatus(msg, type) {
      try {
        const statusMsg = document.getElementById('statusMsg');
        const statusText = document.getElementById('statusText');
        const statusIconContainer = document.getElementById('statusIconContainer');
        
        statusText.innerHTML = msg; 
        statusMsg.className = 'p-4 rounded-xl flex items-center text-sm border font-medium mb-6 transition-all';
        
        let svgIcon = '';
        if(type === 'error') {
          statusMsg.classList.add('bg-red-900/50', 'text-red-300', 'border-red-800');
          svgIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
        } else if(type === 'success') {
          statusMsg.classList.add('bg-green-900/50', 'text-green-300', 'border-green-800');
          svgIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        } else if(type === 'loading') {
          statusMsg.classList.add('bg-blue-900/50', 'text-blue-300', 'border-blue-800');
          svgIcon = `<svg class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>`;
        } else {
          statusMsg.classList.add('bg-blue-900/50', 'text-blue-300', 'border-blue-800');
          svgIcon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`;
        }
        
        statusIconContainer.innerHTML = svgIcon;
        statusMsg.style.display = 'flex';
        
      } catch (e) {
        console.error("Status Msg Error:", e);
      }
    }

    // 파일 업로드 처리
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.type !== "text/plain" && !file.name.endsWith('.txt')) {
        showStatus('TXT 파일만 업로드 가능합니다.', 'error');
        return;
      }

      currentFileName = file.name.replace('.txt', '_AI수정본.txt');
      
      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('originalText').value = event.target.result;
        document.getElementById('editedText').value = '';
        checkEditedText();
        document.getElementById('successBadge').classList.add('hidden');
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    // 버튼 활성화 상태 확인
    function checkEditedText() {
      const saveBtn = document.getElementById('saveBtn');
      const copyBtn = document.getElementById('copyBtn');
      
      const hasText = document.getElementById('editedText').value.trim().length > 0;
      
      const activeClass = "flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 rounded-lg font-medium text-sm transition-colors bg-indigo-600 text-white hover:bg-indigo-500 border border-indigo-500 shadow-sm cursor-pointer";
      const disabledClass = "flex-1 md:flex-none flex items-center justify-center px-4 py-2.5 rounded-lg font-medium text-sm transition-colors bg-gray-700 text-gray-500 cursor-not-allowed border border-gray-600 shadow-sm";

      if (hasText) {
        saveBtn.disabled = false;
        copyBtn.disabled = false;
        saveBtn.className = activeClass;
        copyBtn.className = activeClass;
      } else {
        saveBtn.disabled = true;
        copyBtn.disabled = true;
        saveBtn.className = disabledClass;
        copyBtn.className = disabledClass;
      }
    }

    // 다운로드 (저장) 로직
    async function downloadResult() {
      let editedText = document.getElementById('editedText').value;

      if (!editedText.trim()) {
        editedText = document.getElementById('originalText').value;
      }

      const fileName = currentFileName || '수정된_가사.txt';

      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: fileName,
            types: [{ description: '텍스트 파일', accept: {'text/plain': ['.txt']} }]
          });

          const writable = await handle.createWritable();
          await writable.write("\ufeff" + editedText);
          await writable.close();

          showStatus('파일이 PC에 성공적으로 저장되었습니다!', 'success');
          return;

        } catch (err) {
          if (err.name === 'AbortError') return;
          console.warn(err);
          showStatus(err.message, 'error');
        }
      } else {
          const blob = new Blob(["\ufeff" + editedText], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showStatus('파일이 다운로드 폴더에 저장되었습니다!', 'success');
      }
    }

    // 클립보드 복사 로직
    function copyResult() {
      let editedText = document.getElementById('editedText').value;

      if (!editedText.trim()) {
          editedText = document.getElementById('originalText').value;
      }

      const textArea = document.createElement("textarea");
      textArea.value = editedText;
      textArea.style.position = "fixed";
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        document.execCommand('copy');
        showStatus('수정된 가사가 클립보드에 복사되었습니다! 원하는 메모장이나 문서에 붙여넣기(Ctrl+V) 해주세요.', 'success');
      } catch (err) {
        showStatus('복사에 실패했습니다. 우측 화면을 직접 드래그해서 복사해주세요.', 'error');
      }
      document.body.removeChild(textArea);
    }

    // 진입점
    function processLyricsAI() {
      const originalText = document.getElementById('originalText').value;
      const apiKey = document.getElementById('apiKeyInput').value.trim();

      if (!originalText.trim()) {
        showStatus('수정할 가사를 먼저 입력해주세요.', 'error');
        return;
      }
      
      if (!apiKey) {
        showStatus('상단의 입력란에 무료 API 키를 먼저 입력해주세요.', 'error');
        document.getElementById('apiKeyInput').focus();
        return;
      }

      // 기본 편곡 모드 즉시 실행
      runAILogic(originalText, apiKey);
    }

    // 핵심 AI 호출 및 처리 로직
    async function runAILogic(originalText, apiKey) {
      const userStylePrompt = document.getElementById('stylePrompt')?.value?.trim() || "";
      const btn = document.getElementById('processBtn');
      const iconWand = document.getElementById('iconWand');
      const iconLoader = document.getElementById('iconLoader');
      const btnText = document.getElementById('btnText');
      
      try {
        // 로딩 UI 설정
        btn.disabled = true;
        btn.classList.add('opacity-70', 'cursor-wait');
        iconWand.classList.add('hidden');
        iconLoader.classList.remove('hidden');
        btnText.textContent = '프로페셔널 프롬프트로 편곡 중입니다...';
        showStatus('AI가 팝/R&B 스타일로 문맥을 파악하며 가사를 편곡 중입니다. 잠시만 기다려주세요...', 'loading');

        let requestText = `Original lyrics:\n\n${originalText}`;

        const systemInstruction = `당신은 세계적인 히트곡을 만드는 천재 Topliner이자 작사가입니다. Pop, Dance, R&B 등 여러 보컬 장르에 두루 자연스럽게 어울리며 특정한 프로덕션 스타일에 국한되지 않는 인간적이고 진정성 있는 가사를 작성해야 합니다.
특히 Suno와 같은 AI 보컬 생성기에 최적화된, 부르기 쉽고(Singable) 명확한 구조의 가사를 만들어야 합니다.

사용자가 여러 곡의 가사를 입력할 수 있습니다.
각 곡은 "Title:" 로 시작합니다.

각 곡을 서로 독립된 노래로 인식하고
각 곡마다 새로운 가사를 생성하세요.

절대 여러 곡을 하나로 합치지 마세요.
입력된 곡 수와 동일한 개수의 곡을 출력해야 합니다.

사용자의 원본 가사를 분석하여 다음 필수 가이드라인과 옵션에 따라 가사를 자연스럽게 다듬고 교정하세요:

[Lyric Editing Mode]

You are editing existing song lyrics, not writing a completely new song.

Rules:

- Preserve the original meaning, story, and emotional flow of the lyrics.
- Preserve the existing song structure (Verse, Chorus, Bridge, etc.).
- Do NOT rewrite the entire song.
- Only adjust lines when necessary to improve clarity, phrasing, or singability.
- Keep as much of the original wording as possible.
- Avoid replacing lines unless they clearly need improvement.

The goal is to gently refine the lyrics so they feel more natural and singable while keeping the original song intact.

[Output Format Requirement - STRICT]
1. 출력은 반드시 곡명으로 시작해야 합니다.
   형식: Title: <Song Title>
2. 곡명 다음 줄부터 가사가 시작됩니다.
3. 어떤 인사말, 부연 설명, 주석도 절대 포함하지 마세요. 오직 Title과 Lyrics만 출력합니다.

[Required Song Structure]
가사는 반드시 다음 구조를 따라야 합니다 (태그 포함):
[Verse 1]
[Pre-Chorus]
[Chorus]
[Verse 2]
[Chorus]
[Bridge]
[Final Chorus]
[Outro]

[Strict Line Length Rule]

Recommended lyric density for mid-tempo songs:

- Most lyric lines should contain **5–8 words**

Allowed variation:

- Some short lines (**3–4 words**) may appear occasionally for emotional emphasis or hooks

Maximum limit:

- No lyric line may exceed **10 words**

Important rules:

- Short lines must NOT dominate the lyrics
- The majority of lines should remain within **5–8 words**
- Maintain a natural rhythmic balance suitable for mid-tempo vocal phrasing

[Hook Rule - Chorus Structure]
- Chorus must contain a clear and memorable hook.
- The main hook line may repeat in the chorus if it strengthens the song.
- The hook should feel emotionally direct and easy to remember.

However, avoid making the entire chorus a simple mechanical repetition.
The chorus should combine repetition with variation to keep it interesting.

Guidelines:
- The hook line should appear naturally in the chorus.
- The same line should not dominate the entire chorus.
- Variation lines may appear between hook repetitions.
- Different songs should naturally vary their chorus structures.
- The chorus should remain catchy, dynamic, and emotionally engaging.

[Additional Rules]
1. 감정의 직접적 설명 금지 (Show, don't tell).
2. 음악/프로덕션 묘사 금지 (Avoid describing the music).
3. 지시문/효과음 절대 금지 (No stage directions).
4. The final line of the Outro MUST NOT repeat the song title or the main hook.
5. Avoid mechanical lyrical patterns. Each song must have natural human-like variation in emotional flow, phrasing, and imagery so that songs do not feel generated from the same template.
6. The main hook should include at least one of the following:
   - a personal emotion (I feel, I miss, I need, I want, etc.)
   - a human action (running, holding, staying, calling, leaving, etc.)
   - a situation connected to the singer (alone, lost, waiting, holding on, etc.)

Avoid hooks that only describe scenery or background such as city, rain, shadows, lights, night, or silence without any emotional or human context.

The hook should feel like a human emotional statement rather than just a visual description.

예시:

Bad hook example:
City in the rain

Better hook examples:
Lost in the city rain
Running through the city rain
Alone in the city rain

[CRITICAL RULE — STRICT BAN ON MUSIC AND SOUND REFERENCES]

Lyrics must NOT contain ANY references to:

• musical instruments
• music production
• rhythm
• beats
• sound effects
• sonic textures
• audio sensations
• acoustic descriptions

This rule must be enforced strictly.

[BANNED WORDS (STRICT)]

The following words must NEVER appear in lyrics:

drum
drums
snare
synth
synths
bass
low-end
piano
electric piano
keys
instrument
music
production
melody
beat
beats
rhythm
pulse
click
clicking
snap
hum
vibration
echo
static
tap
tone
sound
resonance

If any of these words appear in the source lyrics, they MUST be removed or replaced.

[NO SOUND IMAGERY]

The AI must NOT describe anything using sound or rhythm metaphors.

Examples of forbidden descriptions:

• "a steady rhythm"
• "a pulse in the dark"
• "a deep hum"
• "a sharp snap"
• "echoing in the night"
• "a quiet beat"
• "vibration in the air"

Even if these are used metaphorically, they are NOT allowed.

[REPLACEMENT STRATEGY]

If the original lyric contains sound-based imagery, the AI must replace it with NON-AUDIO imagery.

Allowed imagery types include:

• emotions
• physical sensations
• visual imagery
• movement
• light and darkness
• atmosphere
• memory
• human actions
• environment

Examples:

"a steady rhythm" -> emotional tension or movement
"a pulse in the dark" -> quiet presence or rising feeling
"a sharp snap" -> sudden realization or emotional break

The meaning should remain, but the sound reference must disappear.

[FINAL RULE]

Lyrics must focus only on:

• feelings
• relationships
• inner thoughts
• situations
• visual or emotional imagery

They must NOT reference sound, music, rhythm, beats, or audio sensations in any form.

This rule must be applied consistently across all songs.

[Song Variety Guideline]
When generating multiple songs, ensure natural variation between songs.
- Chorus structures should not be identical across songs.
- Hook placement may vary naturally within the chorus.
- Hooks may appear once or repeat if it improves the song.
- Avoid repeating the same hook wording across songs.
- Avoid repeating the same imagery, themes, or metaphors across songs.
- Each song should feel like a distinct creative idea with different emotional focus and vocabulary.

[Chorus Structure Variation Rule]
When generating multiple songs, do NOT reuse the same chorus pattern across songs.

Avoid repeating the same structure such as:
Hook
Line
Hook
Line

Each song should use a different chorus structure.

Possible variations include:
- Hook repeated at the beginning
- Hook appearing at the end
- Hook separated by two different lines
- Chorus starting with a non-hook line
- Chorus ending with the hook

The hook may appear once or multiple times, but its position should vary between songs.

The goal is to prevent identical chorus patterns and create natural structural diversity across songs.

[Vocabulary Guidelines]
Human & Authentic Vocabulary:
Avoid mechanical patterns such as "A + adjective + noun" (for example: "a soft warmth").
Use natural, conversational language that sounds like real human pop lyrics.

[Optional Style Direction]
If the user provides a style prompt, adapt the tone, imagery, and vocabulary to match.

- 다시 한번 강조합니다. 인사말이나 설명 없이 오직 'Title: <Song Title>'로 시작하는 가사만 깔끔하게 출력하세요.`;

        if (userStylePrompt) {
          requestText += `\n\nStyle direction (optional):\n${userStylePrompt}`;
        }
        let promptText = systemInstruction + "\n\n" + requestText;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`;

        const payload = {
          contents: [{
            parts: [{ text: promptText }]
          }],
          generationConfig: {
            temperature: 0.7, // 고정된 온도로 복구
            topP: 0.9
          }
        };

        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error?.message || `API 연결 에러 (${response.status})`);
        }

        if (!data.candidates || data.candidates.length === 0) {
          throw new Error('AI가 분석된 결과를 반환하지 않았습니다.');
        }

        const parts = data.candidates?.[0]?.content?.parts || [];
        const finalResult = parts.map(p => p.text).join("");
        
        if (finalResult) {
          document.getElementById('editedText').value = finalResult;
          checkEditedText();
          document.getElementById('successBadge').classList.remove('hidden');
          showStatus('AI 가사 편곡이 성공적으로 완료되었습니다!', 'success');
        } else {
          throw new Error('응답 형식에서 텍스트를 추출할 수 없습니다.');
        }

      } catch (error) {
        let errorMsg = error.message;
        
        // 에러 원인 안내 강화
        if (errorMsg.includes('API_KEY_INVALID') || errorMsg.toLowerCase().includes('api key not valid')) {
          errorMsg = `입력하신 API 키가 유효하지 않습니다. <br/>
          <span class="block mt-2 text-red-200">
            👉 복사 과정에서 <b>공백</b>이 들어갔는지 확인하세요. (키는 항상 <b>AIzaSy...</b> 로 시작합니다.)<br/>
            👉 Google Cloud Console에서 해당 키에 <b>[웹사이트 제한(HTTP 리퍼러)]</b>이 걸려있다면 현재 테스트 중인 로컬 주소를 추가하거나 제한을 해제해야 합니다.
          </span>`;
        } else if (errorMsg.includes('Quota exceeded') || errorMsg.includes('limit: 0')) {
          errorMsg = `구글 계정의 무료 사용량 한도(Quota)가 0으로 제한되어 있습니다. <br/>
          <span class="block mt-2 text-red-200">
            👉 <b>해결 방법:</b> Google Cloud 또는 AI Studio에서 결제 수단(Billing)을 등록하시거나, 아예 <b>다른 구글 계정</b>으로 로그인하여 새 API 키를 발급받아 보세요.
          </span>`;
        }

        showStatus(`API 호출 실패: ${errorMsg}`, 'error');
        console.error("AI 처리 중 오류:", error);
      } finally {
        btn.disabled = false;
        btn.classList.remove('opacity-70', 'cursor-wait');
        iconLoader.classList.add('hidden');
        iconWand.classList.remove('hidden');
        btnText.textContent = '개인 API로 프로페셔널 AI 가사 편곡 시작';
      }
    }
